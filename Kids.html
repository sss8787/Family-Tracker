<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1040" />
<title>برنامجي اليومي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #1a1040 0%, #2d1b69 50%, #3b1f7a 100%);
    color: white;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  #app { max-width: 480px; margin: 0 auto; padding: 0; }

  .header {
    padding: 32px 24px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .header .day { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 4px; font-weight: 500; }
  .header h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
  .header-right { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px; width: 44px; height: 44px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px;
  }

  /* Stars progress */
  .stars-row {
    display: flex; justify-content: center; gap: 12px;
    padding: 28px 24px 8px;
  }
  .star {
    font-size: 44px;
    filter: grayscale(1) opacity(0.3);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform: scale(0.9);
  }
  .star.filled {
    filter: none;
    transform: scale(1.1);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .progress-text {
    text-align: center; font-size: 18px; font-weight: 700;
    color: #fcd34d; padding: 4px 24px 20px;
  }

  .cheer-banner {
    background: linear-gradient(135deg, rgba(252,211,77,0.2), rgba(251,146,60,0.12));
    border: 2px solid rgba(252,211,77,0.4);
    border-radius: 18px; padding: 18px 22px; margin: 0 24px 20px;
    position: relative; font-size: 18px; line-height: 1.6;
    color: #fde68a; text-align: center; font-weight: 700;
    animation: slideIn 0.4s ease;
  }

  .task-list { padding: 0 24px 32px; display: flex; flex-direction: column; gap: 14px; }
  .task {
    width: 100%; display: flex; align-items: center; gap: 16px;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 22px 22px; cursor: pointer;
    text-align: right; transition: all 0.3s ease; font-family: inherit;
    color: white;
  }
  .task.done {
    background: linear-gradient(135deg, rgba(74,222,128,0.2), rgba(34,197,94,0.1));
    border-color: rgba(134,239,172,0.5);
  }
  .task.done .text { color: rgba(255,255,255,0.6); }
  .task[disabled] { opacity: 0.6; cursor: wait; }
  .checkbox {
    width: 34px; height: 34px; border-radius: 10px;
    border: 3px solid rgba(255,255,255,0.3); background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.3s ease;
  }
  .task.done .checkbox {
    border: none;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    transform: scale(1.1);
  }
  .task .text { font-size: 20px; flex: 1; font-weight: 700; }

  .footer { text-align: center; color: rgba(255,255,255,0.25); font-size: 12px; padding-bottom: 24px; }

  /* Victory */
  .victory-overlay {
    position: fixed; inset: 0; background: rgba(26,16,64,0.92);
    backdrop-filter: blur(12px); z-index: 200;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 32px 24px; text-align: center;
  }
  .victory-stars { font-size: 56px; margin-bottom: 12px; animation: pulse 1.2s infinite; }
  .victory-title {
    font-size: 34px; font-weight: 800; margin-bottom: 12px;
    color: #fcd34d;
  }
  .victory-msg {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(252,211,77,0.3);
    border-radius: 20px; padding: 24px 28px; margin-bottom: 32px;
    font-size: 22px; line-height: 1.6; color: white; font-weight: 700;
    max-width: 340px;
  }
  .victory-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
  .victory-actions button {
    width: 100%; padding: 18px; border-radius: 16px;
    font-weight: 800; font-size: 18px; font-family: inherit; cursor: pointer;
  }
  .victory-actions .primary {
    background: linear-gradient(135deg, #fcd34d, #fb923c);
    border: none; color: #1a1040;
  }
  .victory-actions .secondary {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    color: white;
  }

  /* Settings */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,16,64,0.8);
    backdrop-filter: blur(8px); z-index: 100;
    display: flex; align-items: flex-end;
  }
  .modal {
    background: #2d1b69; border: 1px solid rgba(255,255,255,0.15);
    border-top-left-radius: 24px; border-top-right-radius: 24px;
    padding: 28px 24px 40px; width: 100%; max-height: 85vh; overflow-y: auto;
    max-width: 480px; margin: 0 auto;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
  }
  .modal-header h2 { font-size: 22px; }
  .modal-close {
    background: none; border: none; color: rgba(255,255,255,0.6);
    font-size: 28px; cursor: pointer;
  }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .toggle-row span { font-size: 17px; color: white; font-weight: 500; }
  .toggle {
    width: 56px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,0.15); border: none;
    cursor: pointer; position: relative; transition: background 0.2s;
  }
  .toggle.on { background: #4ade80; }
  .toggle::after {
    content: ''; width: 24px; height: 24px; border-radius: 50%;
    background: white; position: absolute; top: 3px; right: 3px;
    transition: right 0.2s;
  }
  .toggle.on::after { right: 29px; }
  .voice-option {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; margin-bottom: 10px; border-radius: 14px;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
  }
  .voice-option.active { background: rgba(252,211,77,0.12); border-color: rgba(252,211,77,0.4); }
  .voice-option .name { font-size: 16px; font-weight: 700; }
  .voice-option.active .name { color: #fcd34d; }
  .preview-btn {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px; padding: 8px 16px; color: white;
    font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 700;
  }
  .field-label {
    display: block; color: rgba(255,255,255,0.6); font-size: 13px;
    margin-bottom: 10px; font-weight: 500;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  @keyframes pop {
    0% { transform: scale(0.9); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1.1); }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div>
      <p class="day" id="weekday"></p>
      <h1 id="greeting">برنامجي اليومي</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="openSettings" title="الإعدادات">⚙</button>
    </div>
  </div>

  <div class="stars-row" id="starsRow"></div>
  <div class="progress-text" id="progressText"></div>

  <div id="cheerContainer"></div>

  <div class="task-list" id="taskList"></div>

  <p class="footer">✦</p>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>الإعدادات</h2>
      <button class="modal-close" id="closeSettings">×</button>
    </div>

    <div class="toggle-row">
      <span>الصوت المشجّع</span>
      <button class="toggle" id="voiceToggle"></button>
    </div>

    <div id="voiceSection">
      <label class="field-label">اختاري الصوت</label>
      <div id="voiceOptions"></div>
    </div>
  </div>
</div>

<!-- Victory Modal -->
<div class="victory-overlay hidden" id="victoryModal">
  <div class="victory-stars">🌟🌟🌟</div>
  <h1 class="victory-title" id="victoryTitle">أحسنتِ!</h1>
  <div class="victory-msg" id="victoryMsg"></div>
  <div class="victory-actions">
    <button class="primary" id="victoryShare">📷 احفظي الصورة</button>
    <button class="secondary" id="victoryClose">تمام</button>
  </div>
</div>

<!-- Hidden share card -->
<div class="share-card" id="shareCard" style="position:fixed; top:0; left:0; width:480px; padding:40px 32px; background:linear-gradient(160deg, #1a1040 0%, #2d1b69 50%, #3b1f7a 100%); opacity:0; pointer-events:none; z-index:-1; box-sizing:border-box; font-family:'Tajawal',sans-serif; color:white;" dir="rtl">
  <div style="text-align:center; margin-bottom:24px;">
    <div style="font-size:48px; margin-bottom:8px;">🌟</div>
    <div style="font-size:28px; font-weight:800; color:#fcd34d;" id="sc-title">أحسنتِ!</div>
    <div style="font-size:15px; color:rgba(255,255,255,0.6); margin-top:6px;" id="sc-date"></div>
  </div>
  <div id="sc-tasks" style="margin-bottom:24px;"></div>
  <div style="background:rgba(255,255,255,0.1); border:2px solid rgba(252,211,77,0.3); border-radius:18px; padding:20px 24px; font-size:19px; line-height:1.6; font-weight:700; text-align:center;" id="sc-cheer"></div>
  <div style="text-align:center; margin-top:20px; font-size:13px; color:rgba(255,255,255,0.3);">برنامجي اليومي</div>
</div>

<script>
// ── Config (SEPARATE storage keys from the parent's tracker) ──────────────────

const ELEVENLABS_API_KEY = "sk_815243707ed9e0811124c25c831b347fde5e0e519f0892bd";
const STORAGE_KEY = "kid_tracker_days_v1";
const SETTINGS_KEY = "kid_tracker_settings_v1";

const TASKS = [
  "مراجعة سورة الفاتحة",
  "مراجعة سورة الإخلاص",
  "مراجعة سورة الفلق",
  "مراجعة سورة الناس",
];

const WIN_THRESHOLD = 2; // finishing 2 tasks = a win

// Warm Arabic voices (multilingual_v2 handles Arabic)
const EL_VOICES = [
  { id: "EXAVITQu4vr4xnSDxMaL", name: "سارة" },
  { id: "XB0fDUnXU5powFXDhCwa", name: "شارلوت" },
  { id: "pFZP5JQG7iQjIQuC4Bku", name: "ليلى" },
];

// ── Arabic encouragement (simple, joyful, for a 6-year-old) ───────────────────

const CHEERS = {
  // when she checks one task (but hasn't hit the win yet)
  one: [
    "أحسنتِ يا بطلة! 🌟",
    "ما شاء الله! واصلي يا حبيبتي.",
    "رائعة! الله يبارك فيكِ.",
    "خطوة جميلة! أنتِ تستطيعين.",
    "ممتازة! واحدة أخرى وتقتربين أكثر.",
    "بارك الله فيكِ! استمري يا غالية.",
    "أحسنتِ صنعًا! أنا فخور بكِ.",
    "جميل جدًا! قلبكِ نظيف وجميل مثل عملكِ.",
  ],
  // reached the win threshold (2 tasks)
  win: [
    "أحسنتِ يا بطلة! أكملتِ ما يكفي ليومكِ. 🌟🌟",
    "ما شاء الله عليكِ! اليوم يوم رائع. تبارك الله!",
    "هنيئًا لكِ! الله يحب من يراجع كتابه. أنتِ نجمة! ⭐",
    "رائعة رائعة! فخور جدًا بكِ يا حبيبتي.",
    "بطلة القرآن! بارك الله فيكِ وزادكِ من فضله.",
    "أكملتِ يومكِ بنجاح! نجمة لامعة أنتِ. 🌟",
  ],
  // finished ALL four
  all: [
    "سبحان الله! أكملتِ كل السور! أنتِ بطلة حقيقية! 🌟🌟🌟",
    "ما شاء الله تبارك الله! كل شيء تمام! أنتِ كنز.",
    "رائعة من البداية للنهاية! الله يحفظكِ ويباركِ فيكِ. 🌟",
    "أكملتِ كل شيء! يومٌ كامل من النور. فخور بكِ جدًا!",
    "كل السور الأربع! أنتِ نجمة السماء الليلة. ⭐⭐⭐",
  ],
};

function pickCheer(type) {
  const pool = CHEERS[type] || CHEERS.one;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── Storage ───────────────────────────────────────────────────────────────────

function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch { return {}; }
}
function saveStorage(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}"); }
  catch { return {}; }
}
function saveSettings(d) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(d)); }

// ── Audio ─────────────────────────────────────────────────────────────────────

let sharedAudio = null;
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  if (!sharedAudio) { sharedAudio = new Audio(); sharedAudio.preload = "auto"; }
  sharedAudio.muted = true;
  const p = sharedAudio.play();
  if (p && p.then) {
    p.then(() => { sharedAudio.pause(); sharedAudio.muted = false; audioUnlocked = true; })
     .catch(() => { sharedAudio.muted = false; });
  }
}

async function speak(text, voiceId) {
  const vid = voiceId || EL_VOICES[0].id;
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "xi-api-key": ELEVENLABS_API_KEY,
        "Accept": "audio/mpeg",
      },
      body: JSON.stringify({
        text,
        model_id: "eleven_multilingual_v2",
        voice_settings: { stability: 0.5, similarity_boost: 0.75 },
      }),
    });
    if (!res.ok) throw new Error("EL " + res.status);
    const blob = await res.blob();
    if (blob.size < 500) throw new Error("empty");
    const url = URL.createObjectURL(blob);
    if (!sharedAudio) sharedAudio = new Audio();
    sharedAudio.pause();
    sharedAudio.src = url;
    sharedAudio.onended = () => URL.revokeObjectURL(url);
    const p = sharedAudio.play();
    if (p && p.catch) p.catch(() => browserTTS(text));
  } catch (e) {
    browserTTS(text);
  }
}

function browserTTS(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ar';
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

function vibrate(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch {} } }

// ── State ─────────────────────────────────────────────────────────────────────

let settings = {};
let dayState = {};

function loadState() {
  const s = loadSettings();
  settings = {
    voice: s.voice !== false,
    voiceId: s.voiceId || EL_VOICES[0].id,
  };
  const store = loadStorage();
  dayState = store[todayKey()] || {};
}

function persist() {
  const store = loadStorage();
  store[todayKey()] = dayState;
  saveStorage(store);
}

function doneCount() {
  return TASKS.filter(t => dayState[t] === 'done').length;
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('weekday').textContent = days[new Date().getDay()];

  const done = doneCount();
  const total = TASKS.length;

  // Stars (one per task)
  const starsRow = document.getElementById('starsRow');
  starsRow.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const star = document.createElement('div');
    star.className = 'star' + (i < done ? ' filled' : '');
    star.textContent = '⭐';
    starsRow.appendChild(star);
  }

  // Progress text
  const pt = document.getElementById('progressText');
  if (done === 0) pt.textContent = 'هيا نبدأ! 🌙';
  else if (done >= total) pt.textContent = 'أكملتِ كل شيء! 🌟';
  else if (done >= WIN_THRESHOLD) pt.textContent = 'أحسنتِ! أنجزتِ ما يكفي 🌟';
  else pt.textContent = 'أنتِ تقتربين! 💫';

  // Tasks
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  TASKS.forEach(task => {
    const btn = document.createElement('button');
    btn.className = 'task' + (dayState[task] === 'done' ? ' done' : '');
    btn.innerHTML = `
      <div class="checkbox">${dayState[task] === 'done' ? '<svg width="18" height="14" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div>
      <span class="text">${task}</span>
    `;
    btn.addEventListener('click', () => handleToggle(task, btn));
    list.appendChild(btn);
  });
}

function showCheer(msg) {
  const c = document.getElementById('cheerContainer');
  c.innerHTML = `<div class="cheer-banner">${msg}</div>`;
  setTimeout(() => {
    const b = c.querySelector('.cheer-banner');
    if (b) { b.style.transition = 'opacity 0.5s'; b.style.opacity = '0'; setTimeout(() => c.innerHTML = '', 500); }
  }, 5000);
}

// ── Interaction ───────────────────────────────────────────────────────────────

let busy = false;

function handleToggle(task, btn) {
  if (busy) return;
  if (settings.voice) unlockAudio();
  busy = true;
  btn.setAttribute('disabled', '');

  const wasDone = dayState[task] === 'done';
  if (wasDone) { delete dayState[task]; }
  else { dayState[task] = 'done'; }
  persist();

  if (!wasDone) {
    vibrate(25);
    const done = doneCount();
    const prevDone = done - 1;
    render();

    if (done === TASKS.length) {
      handleWin('all');
    } else if (done === WIN_THRESHOLD && prevDone < WIN_THRESHOLD) {
      handleWin('win');
    } else {
      const msg = pickCheer('one');
      showCheer(msg);
      if (settings.voice) speak(msg, settings.voiceId);
    }
  } else {
    render();
  }

  setTimeout(() => { busy = false; }, 300);
}

function handleWin(type) {
  const msg = pickCheer(type);
  showCheer(msg);

  const store = loadStorage();
  const key = 'win_' + todayKey();
  const alreadyWon = store[key];

  document.getElementById('victoryTitle').textContent =
    type === 'all' ? 'ما شاء الله! 🌟' : 'أحسنتِ! 🌟';
  document.getElementById('victoryMsg').textContent = msg;
  document.getElementById('victoryModal').classList.remove('hidden');

  vibrate([60, 80, 60, 80, 120]);
  if (settings.voice) speak(msg, settings.voiceId);

  store[key] = true;
  saveStorage(store);
}

document.getElementById('victoryClose').addEventListener('click', () => {
  document.getElementById('victoryModal').classList.add('hidden');
});

// ── Share as image ────────────────────────────────────────────────────────────

function buildShareCard() {
  const today = new Date();
  document.getElementById('sc-title').textContent =
    document.getElementById('victoryTitle').textContent;
  document.getElementById('sc-date').textContent =
    today.toLocaleDateString('ar', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const container = document.getElementById('sc-tasks');
  container.innerHTML = '';
  TASKS.forEach(task => {
    const done = dayState[task] === 'done';
    const line = document.createElement('div');
    line.style.cssText = 'display:flex; align-items:center; gap:12px; padding:12px 16px; margin-bottom:8px; border-radius:12px; font-size:16px; font-weight:700; background:' +
      (done ? 'rgba(74,222,128,0.15)' : 'rgba(255,255,255,0.05)') + '; border:1px solid ' +
      (done ? 'rgba(134,239,172,0.3)' : 'rgba(255,255,255,0.1)') + ';';
    line.innerHTML = `<div style="width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;${done ? 'background:linear-gradient(135deg,#4ade80,#22c55e);' : 'border:2px solid rgba(255,255,255,0.3);'}">${done ? '<svg width="14" height="11" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div><span>${task}</span>`;
    container.appendChild(line);
  });

  document.getElementById('sc-cheer').textContent =
    document.getElementById('victoryMsg').textContent;
}

async function shareAsImage() {
  const btn = document.getElementById('victoryShare');
  const orig = btn.textContent;
  btn.textContent = '...جاري الحفظ';
  btn.setAttribute('disabled', '');

  const loading = document.createElement('div');
  loading.style.cssText = 'position:fixed;inset:0;background:rgba(26,16,64,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;font-family:Tajawal,sans-serif;';
  loading.textContent = '...جاري إنشاء الصورة';
  document.body.appendChild(loading);

  try {
    buildShareCard();
    const node = document.getElementById('shareCard');
    node.style.opacity = '1';
    node.style.zIndex = '1000';
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    await new Promise(r => setTimeout(r, 300));

    const dataUrl = await htmlToImage.toPng(node, {
      pixelRatio: 2, backgroundColor: '#1a1040', cacheBust: true,
      width: node.offsetWidth, height: node.offsetHeight,
    });
    node.style.opacity = '0';
    node.style.zIndex = '-1';

    const blob = await (await fetch(dataUrl)).blob();
    const file = new File([blob], 'star-day.png', { type: 'image/png' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'برنامجي اليومي' });
        return;
      } catch (e) { if (e.name === 'AbortError') return; }
    }
    const a = document.createElement('a');
    a.href = dataUrl; a.download = 'star-day.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch (e) {
    console.error(e);
  } finally {
    document.getElementById('shareCard').style.opacity = '0';
    document.getElementById('shareCard').style.zIndex = '-1';
    loading.remove();
    btn.textContent = orig;
    btn.removeAttribute('disabled');
  }
}

document.getElementById('victoryShare').addEventListener('click', shareAsImage);

// ── Settings ──────────────────────────────────────────────────────────────────

function openSettings() {
  document.getElementById('voiceToggle').classList.toggle('on', settings.voice);
  document.getElementById('voiceSection').classList.toggle('hidden', !settings.voice);
  renderVoiceOptions();
  document.getElementById('settingsModal').classList.remove('hidden');
}

function renderVoiceOptions() {
  const c = document.getElementById('voiceOptions');
  c.innerHTML = '';
  EL_VOICES.forEach(v => {
    const div = document.createElement('div');
    div.className = 'voice-option' + (settings.voiceId === v.id ? ' active' : '');
    div.innerHTML = `<div class="name">${v.name}</div><button class="preview-btn">▶ استمعي</button>`;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('preview-btn')) return;
      settings.voiceId = v.id;
      saveSettings({ ...settings });
      renderVoiceOptions();
      render();
    });
    div.querySelector('.preview-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      unlockAudio();
      speak("أحسنتِ يا بطلة! بارك الله فيكِ.", v.id);
    });
    c.appendChild(div);
  });
}

document.getElementById('openSettings').addEventListener('click', openSettings);
document.getElementById('closeSettings').addEventListener('click', () => {
  document.getElementById('settingsModal').classList.add('hidden');
});
document.getElementById('voiceToggle').addEventListener('click', () => {
  settings.voice = !settings.voice;
  document.getElementById('voiceToggle').classList.toggle('on', settings.voice);
  document.getElementById('voiceSection').classList.toggle('hidden', !settings.voice);
  saveSettings({ ...settings });
});

// ── Init ──────────────────────────────────────────────────────────────────────

loadState();
render();
</script>
