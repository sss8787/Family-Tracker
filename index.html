<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#080d1a" />
<title>Family Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #080d1a 0%, #0d1525 60%, #0a1520 100%);
    color: white;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  body.playful {
    background: linear-gradient(160deg, #1a1040 0%, #2d1b69 50%, #3b1f7a 100%);
    font-family: 'Tajawal', sans-serif;
  }
  #app { max-width: 480px; margin: 0 auto; }

  /* ── Profile picker ─────────────────────────────────────── */
  .picker {
    min-height: 100vh; padding: 60px 24px 40px;
    display: flex; flex-direction: column;
  }
  .picker-title {
    font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px;
  }
  .picker-sub {
    text-align: center; color: rgba(255,255,255,0.4);
    font-size: 14px; margin-bottom: 40px;
  }
  .profile-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 24px;
  }
  .profile-tile {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 28px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s;
    position: relative;
  }
  .profile-tile:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 800;
  }
  .profile-name { font-size: 16px; font-weight: 700; }
  .profile-lock {
    position: absolute; top: 12px; right: 12px;
    font-size: 13px; opacity: 0.5;
  }
  .add-tile {
    background: rgba(255,255,255,0.02);
    border: 2px dashed rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
  }
  .add-tile .profile-avatar { font-size: 36px; font-weight: 300; }

  .manage-link {
    text-align: center; color: rgba(255,255,255,0.35);
    font-size: 13px; cursor: pointer; padding: 12px;
    text-decoration: underline;
  }

  /* ── PIN pad ────────────────────────────────────────────── */
  .pin-overlay {
    position: fixed; inset: 0; background: rgba(8,13,26,0.97);
    z-index: 300; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px;
  }
  .pin-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .pin-sub { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 28px; }
  .pin-dots { display: flex; gap: 16px; margin-bottom: 36px; }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .pin-dot.filled { background: #4ade80; border-color: #4ade80; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 16px; }
  .pin-key {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: white; font-size: 26px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .pin-key:active { background: rgba(255,255,255,0.15); }
  .pin-key.blank { background: none; border: none; cursor: default; }
  .pin-cancel {
    margin-top: 24px; background: none; border: none;
    color: rgba(255,255,255,0.4); font-size: 15px; cursor: pointer;
    font-family: inherit;
  }
  .pin-error { color: #f87171; font-size: 13px; height: 18px; margin-bottom: 12px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">
  <!-- Profile Picker -->
  <div class="picker" id="pickerScreen">
    <div class="picker-title" id="pickerTitle">Family Tracker</div>
    <div class="picker-sub">Who's tracking today?</div>
    <div class="profile-grid" id="profileGrid"></div>
    <div class="manage-link" id="manageLink">Manage profiles</div>
  </div>

  <!-- Main tracker app gets injected here -->
  <div id="trackerRoot" class="hidden"></div>
</div>

<!-- PIN overlay -->
<div class="pin-overlay hidden" id="pinOverlay">
  <div class="pin-title" id="pinTitle">Enter PIN</div>
  <div class="pin-sub" id="pinSub"></div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-pad" id="pinPad"></div>
  <button class="pin-cancel" id="pinCancel">Cancel</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  PROFILE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

const PROFILES_KEY = "ft_profiles_v1";
const LAST_PROFILE_KEY = "ft_last_profile_v1";

// Each profile: { id, name, color, style: 'grounded'|'playful', lang: 'en'|'ar', pin: '1234'|null }
// Per-profile data is stored under keys prefixed with the profile id.

function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function saveProfiles(list) {
  localStorage.setItem(PROFILES_KEY, JSON.stringify(list));
}

const AVATAR_COLORS = [
  'linear-gradient(135deg, #4ade80, #22d3ee)',
  'linear-gradient(135deg, #fcd34d, #fb923c)',
  'linear-gradient(135deg, #a78bfa, #ec4899)',
  'linear-gradient(135deg, #60a5fa, #3b82f6)',
  'linear-gradient(135deg, #f472b6, #fb7185)',
  'linear-gradient(135deg, #34d399, #10b981)',
];

// ── Default profiles (you + daughter) ─────────────────────────────────────────

const SULLY_TASKS = [
  { name: "صلاة الفجر جماعة (أو صلاة الجمعة ج)", group: "الفجر" },
  { name: "نصف ورد مراجعة (أو قراءة*) جزء", group: "الصباح" },
  { name: "ورد القراءة جزء", group: "الصباح" },
  { name: "تثبيت ربع أرباع هود", group: "الصباح" },
  { name: "مقطع أصول فقه أو دعوي", group: "النهار" },
  { name: "مراجعة سورة هود أول أسبوع خ (أو قراءة جزء آخر)", group: "النهار" },
  { name: "تكرار أول ربع من يوسف ٢-٣ مرات و تحضير", group: "النهار" },
  { name: "الصلاة على النبي ٥٠ صلاة إبراهيمية", group: "النهار" },
  { name: "كل الرواتب بالمسجد أو ٤ مع مقطع ملين", group: "النهار" },
  { name: "السنن الرواتب أو ١٢ نافلة (أو التراويح* أو الكهف ج)", group: "المساء" },
  { name: "نصف ورد مراجعة (أو قراءة*) جزء — مساءً", group: "المساء" },
  { name: "ورد القراءة جزء آخر أول أسبوع خ", group: "المساء" },
  { name: "الضحى والوتر أو أحدهم مع التماس وقت دعاء", group: "المساء" },
  { name: "التسبيح النهاري مع الملك أو الأذكار الدورية", group: "النهار" },
  { name: "التسبيح الليلي مع الملك أو الأذكار الدورية", group: "المساء" },
];

const DAUGHTER_TASKS = [
  { name: "مراجعة سورة الفاتحة", group: "" },
  { name: "مراجعة سورة الإخلاص", group: "" },
  { name: "مراجعة سورة الفلق", group: "" },
  { name: "مراجعة سورة الناس", group: "" },
];

function defaultProfiles() {
  return [
    {
      id: 'sully',
      name: 'Sully',
      color: AVATAR_COLORS[0],
      style: 'grounded',
      lang: 'en',
      pin: null,
      seedTasks: SULLY_TASKS,
      seedName: 'Sully',
      winThreshold: null, // null = use all-but-one logic
    },
    {
      id: 'amna',
      name: 'ابنتي',
      color: AVATAR_COLORS[1],
      style: 'playful',
      lang: 'ar',
      pin: null,
      seedTasks: DAUGHTER_TASKS,
      seedName: '',
      winThreshold: 2, // 2 tasks = win
    },
  ];
}

function ensureProfiles() {
  let profiles = loadProfiles();
  if (!profiles || profiles.length === 0) {
    profiles = defaultProfiles();
    saveProfiles(profiles);
    // Seed each profile's task list into its own settings store
    profiles.forEach(seedProfileData);
  }
  return profiles;
}

function seedProfileData(profile) {
  const settingsKey = pk(profile.id, 'settings');
  if (!localStorage.getItem(settingsKey)) {
    const settings = {
      name: profile.seedName || '',
      voice: true,
      voiceId: profile.style === 'playful' ? 'XB0fDUnXU5powFXDhCwa' : 'EXAVITQu4vr4xnSDxMaL',
      haptic: true,
      reminders: ['', '', ''],
      tasks: profile.seedTasks || [],
      style: profile.style,
      lang: profile.lang,
      winThreshold: profile.winThreshold,
    };
    localStorage.setItem(settingsKey, JSON.stringify(settings));
  }
}

// Profile-scoped storage key helper
function pk(profileId, suffix) {
  return `ft_${profileId}_${suffix}`;
}

// ── Active profile ────────────────────────────────────────────────────────────

let activeProfile = null;

function setActiveProfile(profile) {
  activeProfile = profile;
  localStorage.setItem(LAST_PROFILE_KEY, profile.id);
}

// ═══════════════════════════════════════════════════════════════════════════
//  PROFILE PICKER UI
// ═══════════════════════════════════════════════════════════════════════════

function initials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2);
  return (parts[0][0] + parts[1][0]);
}

function renderPicker() {
  const profiles = ensureProfiles();
  const grid = document.getElementById('profileGrid');
  grid.innerHTML = '';

  profiles.forEach(p => {
    const tile = document.createElement('div');
    tile.className = 'profile-tile';
    tile.innerHTML = `
      ${p.pin ? '<div class="profile-lock">🔒</div>' : ''}
      <div class="profile-avatar" style="background:${p.color}"></div>
      <div class="profile-name"></div>
    `;
    tile.querySelector('.profile-avatar').textContent = initials(p.name);
    tile.querySelector('.profile-name').textContent = p.name;
    tile.addEventListener('click', () => openProfile(p));
    grid.appendChild(tile);
  });

  // Add-person tile
  const addTile = document.createElement('div');
  addTile.className = 'profile-tile add-tile';
  addTile.innerHTML = `
    <div class="profile-avatar">+</div>
    <div class="profile-name">Add person</div>
  `;
  addTile.addEventListener('click', addNewProfile);
  grid.appendChild(addTile);
}

function openProfile(profile) {
  if (profile.pin) {
    promptPin(profile.pin, () => enterProfile(profile), profile.name);
  } else {
    enterProfile(profile);
  }
}

function enterProfile(profile) {
  setActiveProfile(profile);
  document.getElementById('pickerScreen').classList.add('hidden');
  document.getElementById('trackerRoot').classList.remove('hidden');
  document.body.classList.toggle('playful', profile.style === 'playful');
  bootTracker(profile);
}

function backToPicker() {
  document.getElementById('trackerRoot').classList.add('hidden');
  document.getElementById('trackerRoot').innerHTML = '';
  document.getElementById('pickerScreen').classList.remove('hidden');
  document.body.classList.remove('playful');
  activeProfile = null;
  renderPicker();
}

function addNewProfile() {
  const name = prompt("New profile name:");
  if (!name || !name.trim()) return;
  const profiles = loadProfiles();
  const id = 'p_' + Date.now();
  const newProfile = {
    id,
    name: name.trim(),
    color: AVATAR_COLORS[profiles.length % AVATAR_COLORS.length],
    style: 'grounded',
    lang: 'en',
    pin: null,
    seedTasks: JSON.parse(JSON.stringify(SULLY_TASKS)), // base on your tracker
    seedName: name.trim(),
    winThreshold: null,
  };
  profiles.push(newProfile);
  saveProfiles(profiles);
  seedProfileData(newProfile);
  renderPicker();
}

// ── Manage profiles (rename, PIN, delete) ─────────────────────────────────────

function openManage() {
  const profiles = loadProfiles();
  let msg = "Manage profiles:\n\n";
  profiles.forEach((p, i) => { msg += `${i + 1}. ${p.name}${p.pin ? ' 🔒' : ''}\n`; });
  msg += "\nEnter the number to manage, or Cancel.";
  const choice = prompt(msg);
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (isNaN(idx) || idx < 0 || idx >= profiles.length) return;
  manageProfile(profiles[idx]);
}

function manageProfile(profile) {
  const action = prompt(
    `Managing "${profile.name}":\n\n` +
    `1. Rename\n` +
    `2. Set/change PIN\n` +
    `3. Remove PIN\n` +
    `4. Delete profile\n\n` +
    `Enter a number:`
  );
  const profiles = loadProfiles();
  const idx = profiles.findIndex(p => p.id === profile.id);

  if (action === '1') {
    const newName = prompt("New name:", profile.name);
    if (newName && newName.trim()) {
      profiles[idx].name = newName.trim();
      saveProfiles(profiles);
    }
  } else if (action === '2') {
    const newPin = prompt("Enter a 4-digit PIN:");
    if (newPin && /^\d{4}$/.test(newPin)) {
      profiles[idx].pin = newPin;
      saveProfiles(profiles);
    } else if (newPin !== null) {
      alert("PIN must be exactly 4 digits.");
    }
  } else if (action === '3') {
    profiles[idx].pin = null;
    saveProfiles(profiles);
  } else if (action === '4') {
    if (confirm(`Delete "${profile.name}" and all their data? This cannot be undone.`)) {
      // Remove all storage keys for this profile
      const prefix = `ft_${profile.id}_`;
      Object.keys(localStorage).filter(k => k.startsWith(prefix)).forEach(k => localStorage.removeItem(k));
      profiles.splice(idx, 1);
      saveProfiles(profiles);
    }
  }
  renderPicker();
}

document.getElementById('manageLink').addEventListener('click', openManage);

// ── PIN pad ───────────────────────────────────────────────────────────────────

let pinBuffer = '';
let pinTarget = '';
let pinOnSuccess = null;

function promptPin(target, onSuccess, profileName) {
  pinBuffer = '';
  pinTarget = target;
  pinOnSuccess = onSuccess;
  document.getElementById('pinSub').textContent = profileName || '';
  document.getElementById('pinError').textContent = '';
  renderPinDots();
  renderPinPad();
  document.getElementById('pinOverlay').classList.remove('hidden');
}

function renderPinDots() {
  const dots = document.getElementById('pinDots');
  dots.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
    dots.appendChild(d);
  }
}

function renderPinPad() {
  const pad = document.getElementById('pinPad');
  pad.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    if (k === '') { btn.className = 'pin-key blank'; pad.appendChild(btn); return; }
    btn.className = 'pin-key';
    btn.textContent = k;
    btn.addEventListener('click', () => pinPress(k));
    pad.appendChild(btn);
  });
}

function pinPress(k) {
  if (k === '⌫') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else if (pinBuffer.length < 4) {
    pinBuffer += k;
  }
  renderPinDots();

  if (pinBuffer.length === 4) {
    setTimeout(() => {
      if (pinBuffer === pinTarget) {
        document.getElementById('pinOverlay').classList.add('hidden');
        if (pinOnSuccess) pinOnSuccess();
      } else {
        document.getElementById('pinError').textContent = 'Wrong PIN, try again';
        pinBuffer = '';
        renderPinDots();
      }
    }, 150);
  }
}

document.getElementById('pinCancel').addEventListener('click', () => {
  document.getElementById('pinOverlay').classList.add('hidden');
  pinBuffer = '';
});

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════════

// On load: show picker. (Could auto-resume last profile, but picker is safer for family use.)
renderPicker();

// Placeholder — replaced by the full tracker engine in Part 2 of the build.
function bootTracker(profile) {
  const root = document.getElementById('trackerRoot');
  root.innerHTML = '<div style="padding:40px 24px;text-align:center;">' +
    '<p style="font-size:18px;margin-bottom:20px;">Tracker for <b>' + profile.name + '</b> loads here.</p>' +
    '<button onclick="backToPicker()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:12px 20px;border-radius:10px;font-size:15px;cursor:pointer;">← Switch profile</button>' +
    '</div>';
}
</script>
</body>
</html>
